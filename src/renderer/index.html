<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Purrmadeath</title>
    <style>
      /* ── Base ──────────────────────────────────────────────────────────── */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
      #game { width: 100%; height: 100%; display: block; }

      /* ── Overlay container - sits above the canvas ─────────────────────── */
      #overlay {
        position: absolute;
        inset: 0;
        z-index: 10;
        pointer-events: none; /* pass-through by default; buttons enable themselves */
        user-select: none;
      }

      /* ── Shared screen style ────────────────────────────────────────────── */
      .screen {
        position: absolute;
        inset: 0;
        display: none; /* shown via JS when active */
        flex-direction: column;
        align-items: center;
        justify-content: center;
        pointer-events: auto;
        background: rgba(4, 4, 10, 0.74);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
      }

      /* ── Main menu ─────────────────────────────────────────────────────── */
      .game-title {
        font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
        font-size: 72px;
        font-weight: 900;
        color: #e8c96a;
        letter-spacing: 6px;
        text-shadow: 0 0 40px rgba(232, 201, 106, 0.45);
        margin-bottom: 8px;
        user-select: none;
      }

      .game-subtitle {
        font-family: monospace;
        font-size: 13px;
        color: #6a7a8a;
        letter-spacing: 3px;
        margin-bottom: 56px;
        user-select: none;
      }

      /* ── Pause menu ─────────────────────────────────────────────────────── */
      .pause-title {
        font-family: 'Segoe UI', sans-serif;
        font-size: 40px;
        font-weight: 700;
        color: #ccd8ea;
        letter-spacing: 5px;
        margin-bottom: 40px;
        user-select: none;
      }

      /* ── Buttons (shared) ───────────────────────────────────────────────── */
      .menu-btn {
        font-family: 'Segoe UI', monospace;
        font-size: 17px;
        color: #d8e2ef;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.14);
        padding: 13px 52px;
        margin: 5px 0;
        cursor: pointer;
        letter-spacing: 1px;
        min-width: 230px;
        transition: background 0.15s ease, border-color 0.15s ease, color 0.12s ease;
        outline: none;
      }

      .menu-btn:hover {
        background: rgba(255, 255, 255, 0.13);
        border-color: rgba(255, 255, 255, 0.32);
        color: #ffffff;
      }

      .menu-btn:active {
        background: rgba(255, 255, 255, 0.20);
      }

      .menu-btn.muted {
        color: #6a7a8a;
        border-color: rgba(255, 255, 255, 0.07);
      }

      .menu-btn.muted:hover {
        color: #9ab0c8;
        border-color: rgba(255, 255, 255, 0.18);
      }

      /* ── Menu column - fixed-width wrapper so all items share the same width */
      .menu-col {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        width: 320px;
      }

      /* Stretch direct-child buttons, inputs, and the connect-row to fill the column.
         Using > (not space) so the compact Join button inside .connect-row is excluded. */
      .menu-col > .menu-btn,
      .menu-col > .connect-row,
      .menu-col > .menu-input {
        width: 100%;
        min-width: 0;
        box-sizing: border-box;
      }

      /* ── Connect form (inside menu) ─────────────────────────────────────── */
      .connect-row {
        display: flex;
        gap: 8px;
        margin: 5px 0;
        align-items: stretch;
      }

      /* Join button - shares menu-btn visuals but no margin and matches input font-size */
      .join-menu-btn {
        font-family: 'Segoe UI', monospace;
        font-size: 15px;
        color: #d8e2ef;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.14);
        padding: 12px 24px;
        cursor: pointer;
        letter-spacing: 1px;
        white-space: nowrap;
        transition: background 0.15s ease, border-color 0.15s ease, color 0.12s ease;
        outline: none;
      }

      .join-menu-btn:hover {
        background: rgba(255, 255, 255, 0.13);
        border-color: rgba(255, 255, 255, 0.32);
        color: #ffffff;
      }

      .join-menu-btn:active { background: rgba(255, 255, 255, 0.20); }

      .menu-input {
        font-family: monospace;
        font-size: 15px;
        color: #d8e2ef;
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.18);
        padding: 12px 16px;
        outline: none;
        min-width: 0;
        flex: none; /* override per-container below */
      }

      /* Inside the IP row the input should grow to fill remaining space */
      .connect-row .menu-input { flex: 1; }

      .menu-input::placeholder { color: #4a5a6a; }

      .menu-input:focus {
        border-color: rgba(255, 255, 255, 0.38);
        background: rgba(255, 255, 255, 0.10);
      }

      .menu-btn.compact {
        min-width: 0;
        padding: 12px 24px;
        white-space: nowrap;
      }

      /* ── Lobby screen ───────────────────────────────────────────────────── */
      #lobby-screen {
        align-items: stretch;
        justify-content: stretch;
        padding: 0;
        gap: 0;
      }

      /* 3-column layout */
      .lobby-layout {
        display: flex;
        flex: 1;
        min-height: 0;
        gap: 0;
      }

      .lobby-col {
        display: flex;
        flex-direction: column;
        padding: 28px 24px;
        border-right: 1px solid rgba(255, 255, 255, 0.06);
      }

      .lobby-col:last-child { border-right: none; }

      .lobby-col-left {
        width: 300px;
        flex-shrink: 0;
      }

      .lobby-col-center {
        flex: 1;
        align-items: center;
      }

      .lobby-col-right {
        width: 260px;
        flex-shrink: 0;
      }

      .lobby-panel-title {
        font-family: monospace;
        font-size: 11px;
        color: #4a5a6a;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 16px;
        user-select: none;
      }

      /* Share row (code copy) */
      #lobby-share-row {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }

      .lobby-share-item {
        display: flex;
        align-items: center;
        gap: 6px;
        background: rgba(30,40,55,0.6);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 4px;
        padding: 4px 10px 4px 8px;
      }

      .lobby-share-label {
        font-family: monospace;
        font-size: 10px;
        color: #4a5a6a;
        letter-spacing: 1px;
        text-transform: uppercase;
        user-select: none;
      }

      .lobby-share-value {
        font-family: monospace;
        font-size: 14px;
        font-weight: 700;
        color: #9bb8d8;
        letter-spacing: 3px;
        user-select: all;
      }

      .btn-copy {
        font-family: monospace;
        font-size: 10px;
        color: #4a5a6a;
        background: none;
        border: 1px solid rgba(255,255,255,0.10);
        border-radius: 3px;
        padding: 2px 6px;
        cursor: pointer;
        transition: color 0.15s, border-color 0.15s;
        user-select: none;
      }

      .btn-copy:hover { color: #9bb8d8; border-color: rgba(255,255,255,0.25); }
      .btn-copy.copied { color: #6bcf7f; border-color: #6bcf7f; }

      /* Player list */
      #lobby-player-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 16px;
      }

      .lobby-slot {
        font-family: 'Segoe UI', sans-serif;
        font-size: 14px;
        padding: 8px 12px;
        border: 1px solid rgba(255, 255, 255, 0.07);
        background: rgba(255, 255, 255, 0.03);
        display: flex;
        align-items: center;
      }

      .lobby-slot.filled {
        color: #d8e2ef;
        border-color: rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.07);
      }

      .lobby-slot.empty { color: #3a4a5a; }

      .lobby-slot-class {
        font-family: monospace;
        font-size: 11px;
        margin-left: 6px;
        letter-spacing: 1px;
      }

      .btn-kick {
        margin-left: auto;
        padding: 2px 10px;
        font-size: 11px;
        background: rgba(200, 60, 60, 0.25);
        color: #e06060;
        border: 1px solid rgba(200, 60, 60, 0.4);
        border-radius: 3px;
        cursor: pointer;
        font-family: 'Segoe UI', sans-serif;
      }
      .btn-kick:hover {
        background: rgba(200, 60, 60, 0.45);
        color: #ff8080;
      }

      /* Chat (inside left column, fills remaining space) */
      .lobby-chat {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
      }

      .lobby-chat-label {
        font-family: monospace;
        font-size: 10px;
        color: #4a5a6a;
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 6px;
        user-select: none;
      }

      #lobby-chat-log {
        flex: 1;
        overflow-y: auto;
        background: rgba(0, 0, 0, 0.3);
        padding: 10px 12px;
        border: 1px solid rgba(255, 255, 255, 0.06);
        margin-bottom: 6px;
        min-height: 80px;
      }

      .chat-line { font-family: monospace; font-size: 12px; color: #8a9ab0; margin: 2px 0; }
      .chat-name { color: #e8c96a; }

      #lobby-chat-input {
        font-family: monospace;
        font-size: 13px;
        color: #d8e2ef;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.14);
        padding: 9px 12px;
        outline: none;
        flex-shrink: 0;
      }

      #lobby-chat-input:focus { border-color: rgba(255, 255, 255, 0.3); }

      /* Class selector (center column) */
      .class-selector {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .class-btn {
        font-family: 'Segoe UI', monospace;
        font-size: 13px;
        color: #8a9ab0;
        background: rgba(255, 255, 255, 0.04);
        border: 2px solid rgba(255, 255, 255, 0.10);
        padding: 12px 24px;
        cursor: pointer;
        letter-spacing: 1px;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
        outline: none;
        min-width: 120px;
        text-align: center;
      }

      .class-btn:hover {
        background: rgba(255, 255, 255, 0.10);
        color: #d8e2ef;
      }

      .class-btn.selected {
        color: #ffffff;
        background: rgba(255, 255, 255, 0.12);
        border-color: currentColor;
      }

      .class-btn[data-class="warrior"].selected { color: #cc9966; border-color: #cc9966; }
      .class-btn[data-class="ranger"].selected  { color: #55cc77; border-color: #55cc77; }
      .class-btn[data-class="mage"].selected    { color: #9966dd; border-color: #9966dd; }

      .class-btn-stats {
        display: block;
        font-size: 10px;
        color: #4a5a6a;
        margin-top: 3px;
        letter-spacing: 0;
      }

      .class-btn.selected .class-btn-stats { color: #6a7a8a; }

      /* Game modifiers placeholder */
      .lobby-placeholder {
        font-family: monospace;
        font-size: 13px;
        color: #3a4a5a;
        text-align: center;
        margin-top: 40px;
        user-select: none;
      }

      /* Lobby bottom action row */
      .lobby-actions {
        display: flex;
        gap: 10px;
        padding: 16px 24px 32px;
        justify-content: flex-end;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
      }
    </style>
  </head>
  <body>
    <!-- Pixi.js canvas is appended here -->
    <div id="game"></div>

    <!-- HTML overlay for menus - world renders as an animated background -->
    <div id="overlay">

      <!-- ── Main Menu ─────────────────────────────────────────────────────── -->
      <div id="menu-screen" class="screen">
        <h1 class="game-title">PURRMADEATH</h1>
        <p class="game-subtitle">co-op &nbsp;·&nbsp; roguelike &nbsp;·&nbsp; survival</p>
        <p id="connection-status" style="font-family:monospace;font-size:11px;letter-spacing:1px;color:#6a7a8a;margin-bottom:28px;user-select:none;">CONNECTING...</p>

        <div class="menu-col">
          <!-- Name entry -->
          <input id="input-display-name" class="menu-input" type="text"
                 placeholder="Your name…" maxlength="24"
                 style="margin-bottom:16px; text-align:center;" />

          <!-- Host -->
          <button id="btn-host-game" class="menu-btn">Host Game</button>

          <!-- Join row: session code + Join button -->
          <div class="connect-row">
            <input id="input-session-code" class="menu-input" type="text"
                   placeholder="Invite code"
                   style="text-align:center;" />
            <button id="btn-join-game" class="join-menu-btn">Join</button>
          </div>

          <button id="btn-stats" class="menu-btn muted" style="margin-top:8px;">Stats</button>
          <button id="btn-settings" class="menu-btn muted">Settings</button>
        </div>
      </div>

      <!-- ── Lobby Screen ───────────────────────────────────────────────────── -->
      <div id="lobby-screen" class="screen">
        <div class="lobby-layout">
          <!-- Left column: lobby info + players + chat -->
          <div class="lobby-col lobby-col-left">
            <p class="lobby-panel-title">Lobby Information</p>
            <div id="lobby-share-row"></div>
            <ul id="lobby-player-list"></ul>
            <div class="lobby-chat">
              <p class="lobby-chat-label">Chat</p>
              <div id="lobby-chat-log"></div>
              <input id="lobby-chat-input" type="text" placeholder="Press Enter to chat…" maxlength="200" />
            </div>
          </div>

          <!-- Center column: class selector -->
          <div class="lobby-col lobby-col-center">
            <p class="lobby-panel-title">Player Classes</p>
            <div id="class-selector" class="class-selector">
              <button class="class-btn selected" data-class="warrior">
                Warrior
                <span class="class-btn-stats">120 HP · Sword · 18 dmg</span>
              </button>
              <button class="class-btn" data-class="ranger">
                Ranger
                <span class="class-btn-stats">80 HP · Bow · 12 dmg</span>
              </button>
              <button class="class-btn" data-class="mage">
                Mage
                <span class="class-btn-stats">70 HP · Staff · 14 dmg</span>
              </button>
            </div>
          </div>

          <!-- Right column: game modifiers (placeholder) -->
          <div class="lobby-col lobby-col-right">
            <p class="lobby-panel-title">Game Modifiers</p>
            <p class="lobby-placeholder">Coming soon...</p>
          </div>
        </div>

        <div class="lobby-actions">
          <button id="btn-lobby-leave" class="menu-btn muted">Leave</button>
          <button id="btn-lobby-start" class="menu-btn">Start Game</button>
        </div>
      </div>

      <!-- ── Pause Screen ──────────────────────────────────────────────────── -->
      <div id="pause-screen" class="screen">
        <h2 class="pause-title">PAUSED</h2>
        <p id="pause-subtitle" style="font-family:monospace;font-size:13px;color:#6a7a8a;margin-bottom:20px;display:none;"></p>
        <p id="pause-stats" style="font-family:monospace;font-size:13px;color:#8a9ab0;margin-bottom:20px;display:none;"></p>
        <button id="btn-resume" class="menu-btn">Resume</button>
        <button id="btn-quit"   class="menu-btn muted">Quit to Menu</button>
      </div>

    </div>

    <!-- Version label - bottom-right corner, always visible -->
    <div id="version-label" style="
      position: absolute;
      bottom: 12px;
      right: 16px;
      font-family: monospace;
      font-size: 11px;
      letter-spacing: 1px;
      color: #3a4a5a;
      user-select: none;
      pointer-events: none;
      z-index: 20;
    "></div>

    <script type="module" src="./src/game.ts"></script>
  </body>
</html>
